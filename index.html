<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avastha – Transforming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a6130;
      --black: #070707;
      --deep: #0d0b06;
      --text: #e8dfc0;
      --muted: #8a7d60;
      --radius: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--black);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: 0.35;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
      overflow: hidden;
    }

    /* radial glow behind album */
    .hero::after {
      content: '';
      position: absolute;
      width: 70vmin; height: 70vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.08); }
    }

    .logo {
      width: clamp(240px, 54vw, 420px);
      margin-bottom: 28px;
      animation: fadeDown 1s ease both;
      filter: brightness(1.2);
    }

    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .album-wrap {
      position: relative;
      width: clamp(260px, 60vmin, 460px);
      margin-bottom: 32px;
      animation: fadeUp 1.1s 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .album-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, var(--gold-light), transparent 40%, var(--gold-dim), transparent 70%, var(--gold-light));
      border-radius: 14px;
      z-index: 0;
      opacity: 0.7;
    }

    .album-img {
      position: relative;
      width: 100%;
      border-radius: 12px;
      display: block;
      z-index: 1;
      box-shadow: 0 20px 80px rgba(0,0,0,0.8), 0 0 40px rgba(201,168,76,0.15);
    }

    .artist-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 8px;
      animation: fadeUp 1.1s 0.4s ease both;
      text-shadow: 0 0 40px rgba(201,168,76,0.4);
    }

    .track-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3.5vw, 1.9rem);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 6px;
      animation: fadeUp 1.1s 0.5s ease both;
    }

    .label-tag {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 1.1s 0.6s ease both;
    }

    /* ── STREAMING SECTION ── */
    .section {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px;
      animation: fadeUp 1.1s 0.7s ease both;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-dim);
      text-align: center;
      margin-bottom: 18px;
    }

    .stream-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 60px;
    }

    .stream-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 10px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      background: rgba(201,168,76,0.05);
      color: var(--text);
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      cursor: pointer;
    }

    .stream-btn:hover {
      background: rgba(201,168,76,0.14);
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,168,76,0.15);
      color: var(--gold-light);
    }

    .stream-btn svg, .stream-btn .icon-img {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* platform accent dots */
    .stream-btn.youtube   { --accent: #ff0000; }
    .stream-btn.soundcloud{ --accent: #ff5500; }
    .stream-btn.spotify   { --accent: #1db954; }
    .stream-btn.beatport  { --accent: #94d500; }
    .stream-btn.apple     { --accent: #fc3c44; }
    .stream-btn.bandcamp  { --accent: #1da0c3; }
    .stream-btn.volumo    { --accent: #7f4dff; }
    .stream-btn.amazon    { --accent: #ff9900; }

    .stream-btn::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent, var(--gold));
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 480px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }
    .divider-icon {
      width: 20px; height: 20px;
      fill: var(--gold-dim);
    }

    /* ── SOCIAL SECTION ── */
    .social-section {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px;
      animation: fadeUp 1.1s 0.9s ease both;
    }

    .social-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      text-decoration: none;
      transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s, background 0.25s;
      overflow: hidden;
    }

    .social-btn:hover {
      transform: scale(1.12);
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(201,168,76,0.2);
      background: rgba(201,168,76,0.08);
    }

    .social-btn img {
      width: 30px; height: 30px;
      object-fit: contain;
    }

    .website-link {
      display: block;
      text-align: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.88rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-decoration: none;
      margin-bottom: 12px;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .website-link:hover {
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 40px 24px 30px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(138,125,96,0.5);
      text-transform: uppercase;
    }
    footer a {
      color: var(--gold-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--gold); }

    /* ── Responsive tweaks ── */
    @media (max-width: 480px) {
      .stream-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 360px) {
      .stream-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
